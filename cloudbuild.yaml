steps:
  # 1. Ottieni un Access Token valido
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'gcloud auth print-access-token > /workspace/access_token'

  # 2. Configura Bundler (Seguendo la documentazione ufficiale)
  - name: 'ruby:3.2'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        token=$(cat /workspace/access_token)
        
        # URL esatto del registry (deve matchare il Gemfile)
        # Assicuriamoci che non ci siano slash finali ambigui
        registry_url="https://europe-west1-ruby.pkg.dev/function-artifact-registry/ruby-gems"
        
        echo "Configuro auth per $registry_url"
        
        # Metodo 1: Sintassi moderna (con username:password combinati)
        # Username fisso: oauth2accesstoken
        bundle config set --local "$registry_url" "oauth2accesstoken:$token"
        
        # Metodo 2: Prova anche con lo slash finale, per sicurezza (Bundler a volte lo vuole)
        bundle config set --local "$registry_url/" "oauth2accesstoken:$token"

        # Installa
        bundle config set --local without 'development test'
        
        # Disabilita Compact Index (Fix per errore UTF-8 su Artifact Registry)
        bundle config set --local disable_compact_index_support true
        
        bundle install --verbose --jobs=4 --retry=3

  # 3. Deploy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud functions deploy send-sms-function \
        --gen2 \
        --region=europe-west1 \
        --runtime=ruby32 \
        --source=. \
        --entry-point=send_sms \
        --trigger-http \
        --allow-unauthenticated \
        --set-secrets=TWILIO_ACCOUNT_SID=twilio-account-sid:latest,TWILIO_AUTH_TOKEN=twilio-auth-token:latest,TWILIO_FROM_NUMBER=twilio-from-number:latest

timeout: '300s'
options:
  logging: CLOUD_LOGGING_ONLY
