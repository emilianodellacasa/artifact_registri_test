steps:
  # 1. Ottieni un Access Token valido
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'gcloud auth print-access-token > /workspace/access_token'

  # 2. Configura credenziali (Manuali) e Installa
  - name: 'ruby:3.2'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        token=$(cat /workspace/access_token)
        registry_url="https://europe-west1-ruby.pkg.dev/function-artifact-registry/ruby-gems"
        
        # Crea directory credentials
        mkdir -p ~/.gem
        chmod 700 ~/.gem
        
        # Scrivi le credenziali nel formato che RubyGems ama
        # Chiave: URL del registry
        # Valore: Bearer TOKEN
        echo ":rubygems_api_key: Bearer $token" > ~/.gem/credentials
        echo "$registry_url: Bearer $token" >> ~/.gem/credentials
        
        chmod 600 ~/.gem/credentials
        
        # Debug: Mostra il contenuto (oscurato) per essere sicuri
        echo "Credenziali create in ~/.gem/credentials"
        
        # Installa
        bundle install --jobs=4 --retry=3

  # 3. Deploy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud functions deploy send-sms-function \
        --gen2 \
        --region=europe-west1 \
        --runtime=ruby32 \
        --source=. \
        --entry-point=send_sms \
        --trigger-http \
        --allow-unauthenticated \
        --set-secrets=TWILIO_ACCOUNT_SID=twilio-account-sid:latest,TWILIO_AUTH_TOKEN=twilio-auth-token:latest,TWILIO_FROM_NUMBER=twilio-from-number:latest

timeout: '300s'
options:
  logging: CLOUD_LOGGING_ONLY
