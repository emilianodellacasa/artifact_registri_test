steps:
  # 1. Ottieni un Access Token valido usando l'immagine SDK di Google
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud auth print-access-token > /workspace/access_token

  # 2. Installa le gemme usando il token per l'autenticazione
  - name: 'ruby:3.2'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Leggi il token
        # Nota: usiamo cat per leggere il contenuto del file
        ACCESS_TOKEN=$(cat /workspace/access_token)
        
        # Configura Bundler
        # L'host deve essere senza protocollo (https://)
        REGISTRY_HOST="europe-west1-ruby.pkg.dev"
        
        echo "Configuro auth per $REGISTRY_HOST..."
        bundle config set --global "https://$REGISTRY_HOST" "oauth2accesstoken:$ACCESS_TOKEN"

        # Installa
        bundle install --jobs=4 --retry=3

  # 3. Deploy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud functions deploy send-sms-function \
        --gen2 \
        --region=europe-west1 \
        --runtime=ruby32 \
        --source=. \
        --entry-point=send_sms \
        --trigger-http \
        --allow-unauthenticated \
        --set-secrets=TWILIO_ACCOUNT_SID=twilio-account-sid:latest,TWILIO_AUTH_TOKEN=twilio-auth-token:latest,TWILIO_FROM_NUMBER=twilio-from-number:latest

timeout: '300s'
options:
  logging: CLOUD_LOGGING_ONLY
