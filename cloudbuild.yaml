steps:
  # 1. Ottieni un Access Token valido usando l'immagine SDK di Google
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud auth print-access-token > /workspace/access_token

  # 2. Installa le gemme usando il token per l'autenticazione
  - name: 'ruby:3.2'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Leggi il token
        TOKEN=$(cat /workspace/access_token)
        
        # Configura Bundler per usare il token come password per il registry
        # L'username è "oauth2accesstoken" (standard GCP)
        # L'host deve corrispondere ESATTAMENTE a quello nel Gemfile (senza protocollo)
        HOST="europe-west1-ruby.pkg.dev"
        
        echo "Configuro auth per $HOST..."
        bundle config set --global $HOST oauth2accesstoken:$TOKEN
        
        # Prova alternativa se sopra fallisce: configurazione via URI
        # bundle config set --global https://europe-west1-ruby.pkg.dev/function-artifact-registry/ruby-gems/ oauth2accesstoken:$TOKEN

        # Installa
        bundle install --jobs=4 --retry=3

  # 3. Deploy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud functions deploy send-sms-function \
        --gen2 \
        --region=europe-west1 \
        --runtime=ruby32 \
        --source=. \
        --entry-point=send_sms \
        --trigger-http \
        --allow-unauthenticated \
        --set-secrets=TWILIO_ACCOUNT_SID=twilio-account-sid:latest,TWILIO_AUTH_TOKEN=twilio-auth-token:latest,TWILIO_FROM_NUMBER=twilio-from-number:latest

timeout: '300s'
options:
  logging: CLOUD_LOGGING_ONLY
