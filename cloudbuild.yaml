steps:
  # 1. Ottieni un Access Token valido
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'gcloud auth print-access-token > /workspace/access_token'

  # 2. Brute Force Vendoring: scarichiamo le gemme via curl bypassando l'indice corrotto
  - name: 'ruby:3.2'
    entrypoint: 'ruby'
    args:
      - '-e'
      - |
        token = File.read('/workspace/access_token').strip
        registry_url = "https://europe-west1-ruby.pkg.dev/function-artifact-registry/ruby-gems/gems"
        
        # Parsiamo il lockfile per la lista completa delle gemme (comprese dipendenze)
        require 'bundler'
        lockfile = Bundler::LockfileParser.new(File.read('Gemfile.lock'))
        
        Dir.mkdir('vendor') unless Dir.exist?('vendor')
        Dir.mkdir('vendor/cache') unless Dir.exist?('vendor/cache')
        
        lockfile.specs.each do |spec|
          filename = "#{spec.name}-#{spec.version}.gem"
          puts "Downloading #{filename}..."
          url = "#{registry_url}/#{filename}"
          # Download diretto bypassando l'indice di Bundler
          system("curl -L -s -H 'Authorization: Bearer #{token}' -o vendor/cache/#{filename} #{url}")
        end

  # 3. Deploy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        token=$(cat /workspace/access_token)
        
        # Fondamentale: rimuoviamo .gcloudignore perché ora vogliamo che 
        # il deploy carichi la cartella vendor/cache appena popolata.
        rm -f .gcloudignore
        rm -rf .bundle
        
        gcloud functions deploy send-sms-function \
        --gen2 \
        --region=europe-west1 \
        --runtime=ruby32 \
        --source=. \
        --entry-point=send_sms \
        --trigger-http \
        --allow-unauthenticated \
        --set-build-env-vars="BUNDLE_EUROPE__WEST1__RUBY__PKG__DEV=oauth2accesstoken:$token" \
        --set-secrets=TWILIO_ACCOUNT_SID=twilio-account-sid:latest,TWILIO_AUTH_TOKEN=twilio-auth-token:latest,TWILIO_FROM_NUMBER=twilio-from-number:latest

timeout: '360s'
options:
  logging: CLOUD_LOGGING_ONLY
